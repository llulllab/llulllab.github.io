<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llull Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Spectral&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.png" type="image/png">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #888;
      --accent: #c8c8c8;
      --border: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.25);
      --serif: 'Spectral', Georgia, serif;
      --sans: 'Space Grotesk', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--serif);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(255,255,255,0.15); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      max-width: 60vw;
      max-height: 40vh;
      height: auto;
      margin-bottom: 48px;
      animation: fadeUp 0.8s ease-out both;
    }

    .language-links {
      display: flex;
      gap: 16px;
      animation: fadeUp 0.8s ease-out 0.15s both;
    }

    .language-links a {
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--fg);
      text-decoration: none;
      border: 1px solid var(--border-strong);
      padding: 10px 28px;
      border-radius: 4px;
      transition: background 0.25s, color 0.25s;
      letter-spacing: 0.3px;
    }

    .language-links a:hover {
      background: var(--fg);
      color: var(--bg);
    }

    .product-links {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      animation: fadeUp 0.8s ease-out 0.3s both;
    }

    .product-links a {
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.25s, border-color 0.25s;
      letter-spacing: 0.3px;
    }

    .product-links a:hover {
      color: var(--fg);
      border-color: var(--border-strong);
    }

    footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 20px;
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      animation: fadeUp 0.8s ease-out 0.45s both;
    }

    footer span { margin: 0 8px; }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--fg); }

    .designed-in {
      display: block;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (min-width: 768px) {
      .logo { max-width: 300px; }
    }
  </style>
</head>
<body>

  <img src="LULL Logo.png" alt="Llull Lab Logo" class="logo">

  <div class="language-links">
    <a href="fr/index.html">Français</a>
    <a href="en/index.html">English</a>
  </div>

  <div class="product-links">
    <a href="https://phi-yo.app" target="_blank">Phi-Yo</a>
    <a href="https://cedulor.com" target="_blank">Cedulor</a>
  </div>
    <div class="product-links">
    <a href="https://llulllab.com/ASGE/" target="_blank">Ambivalence-Centered Semantic Geometry Engine</a>
    <a href="https://llulllab.com/RJE/" target="_blank">Reflective Judgment Engine</a>
  </div>

  <footer>
    <span class="designed-in">Conçu et développé en France</span>
    <a href="mentions-legales.html">Mentions Légales</a>
    <span>·</span>
    <a href="privacy-policy.html">Privacy Policy</a>
    <span>·</span>
    <a href="mailto:contact@llulllab.com">contact@llulllab.com</a>
  </footer>

</body>
</html>
